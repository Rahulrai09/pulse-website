  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs | Pulse Admin</title>
  <link rel="icon" href="/image/pulse-logo.png">
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Core Styles -->
  <link rel="stylesheet" href="/admin/css/admin-shell.css">
  <!-- Page Styles -->
  <link rel="stylesheet" href="/admin/css/blogs.css">
  <link rel="stylesheet" href="css/pulse-admin-theme.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M5DZWPXR"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <div class="admin-shell">
    
    <!-- TOP NAV -->
    <nav class="top-nav">
      <img src="/image/pulse-logo.png" height="28" alt="Pulse">
      <span class="nav-divider"></span>
      <div class="nav-tabs">
        <a href="/admin/dashboard.html" class="nav-tab">Overview</a>
        <a href="/admin/form-submissions.html" class="nav-tab">Submissions</a>
        <a href="/admin/blogs.html" class="nav-tab active">Content</a>
      </div>
      <div class="nav-spacer"></div>
      <button class="nav-icon-btn" id="bell-btn">
        <i class="ti ti-bell"></i>
        <span class="bell-badge" id="bell-badge" style="display:none"></span>
      </button>
      <div class="user-pill" id="user-pill" onclick="window.shellLogout()">
        <div class="user-avatar" id="user-avatar">--</div>
        <span id="user-name">Loading</span>
        <i class="ti ti-chevron-down"></i>
      </div>
    </nav>

    <!-- BODY ROW -->
    <div class="shell-body">
      
      <!-- ICON RAIL -->
      <aside class="icon-rail">
        <a href="/admin/dashboard.html" class="rail-icon" 
           data-page="dashboard" title="Dashboard">
          <i class="ti ti-layout-dashboard"></i>
        </a>
        <a href="/admin/form-submissions.html" class="rail-icon" 
           data-page="submissions" title="Form Submissions">
          <i class="ti ti-mail"></i>
        </a>
        <a href="/admin/blogs.html" class="rail-icon active" 
           data-page="blogs" title="Blogs">
          <i class="ti ti-article"></i>
        </a>
        <a href="/admin/banners.html" class="rail-icon" 
           data-page="banners" title="Banners">
          <i class="ti ti-photo"></i>
        </a>
        <a href="/admin/products.html" class="rail-icon" 
           data-page="products" title="Products">
          <i class="ti ti-box"></i>
        </a>
        <div class="rail-sep"></div>
        <a href="/admin/admin-users.html" class="rail-icon" 
           data-page="users" title="Admin Users">
          <i class="ti ti-users"></i>
        </a>
        <div class="rail-bottom">
          <button class="rail-icon" id="logout-btn" title="Logout" onclick="window.shellLogout()">
            <i class="ti ti-logout"></i>
          </button>
        </div>
      </aside>

      <!-- PAGE CONTENT -->
      <main class="page-content" id="page-content" style="padding:0; display:flex; flex-direction:column; overflow:hidden;">
        
        <!-- MODE A: LIST VIEW -->
        <div id="listView" style="padding:24px; flex:1; overflow-y:auto;">
          <div class="blogs-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <div>
              <h1>Blogs</h1>
              <p class="section-sub">Manage your content and editorial workflow</p>
            </div>
            <button class="btn-primary" id="addBlogBtn" style="width:auto; padding:10px 20px;">+ New post</button>
          </div>

          <div class="tabs-strip" style="display:flex; gap:8px; border-bottom:1px solid rgba(0,0,0,0.05); margin-bottom:24px; padding-bottom:8px;">
            <button class="tab-btn active" data-tab="all" style="background:none; border:none; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; border-radius:8px;">All <span class="tab-count" style="opacity:0.5; font-weight:400;">0</span></button>
            <button class="tab-btn" data-tab="draft" style="background:none; border:none; padding:8px 16px; font-size:13px; font-weight:500; cursor:pointer; border-radius:8px; color:#6b7280;">Drafts <span class="tab-count" style="opacity:0.5; font-weight:400;">0</span></button>
            <button class="tab-btn" data-tab="published" style="background:none; border:none; padding:8px 16px; font-size:13px; font-weight:500; cursor:pointer; border-radius:8px; color:#6b7280;">Published <span class="tab-count" style="opacity:0.5; font-weight:400;">0</span></button>
          </div>

          <div id="blogList" class="blog-card-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:16px;"></div>
        </div>

        <!-- MODE B: EDITOR VIEW -->
        <div id="editorView" class="editor-shell" style="display:none; flex:1; overflow:hidden;">
          <!-- Existing editor structure preserved -->
          <div style="display:flex; height:100%; overflow:hidden;">
            <div class="editor-main" style="flex:1; overflow-y:auto; padding:40px;">
              <input type="text" id="blogTitle" class="editor-title-input" placeholder="Post title" style="width:100%; border:none; font-size:32px; font-weight:700; margin-bottom:12px; outline:none;">
              <div class="editor-slug-wrap" style="font-size:12px; color:#9ca3af; margin-bottom:40px;">
                <span>Permalink:</span> /blog/<span id="slugPreview">...</span>
                <input type="hidden" id="blogSlug">
              </div>
              <div id="tiptapEditor" class="tiptap-content" style="min-height:400px; font-size:16px; line-height:1.7;"></div>
            </div>
            <aside class="editor-sidebar" style="width:300px; background:#fff; border-left:1px solid rgba(0,0,0,0.05); padding:20px; overflow-y:auto;">
              <form id="blogForm">
                <div class="sidebar-widget" style="margin-bottom:24px;">
                  <h4 style="font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; margin-bottom:12px;">Status & Visibility</h4>
                  <select name="status" id="blogStatus" style="width:100%; padding:8px; border-radius:8px; border:1px solid rgba(0,0,0,0.1);">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                  </select>
                </div>
                <!-- Other widgets... -->
              </form>
            </aside>
          </div>
          <div class="editor-footer" style="padding:16px 24px; background:#fff; border-top:1px solid rgba(0,0,0,0.05); display:flex; justify-content:space-between; align-items:center;">
             <div id="autoSaveIndicator" style="font-size:12px; color:#9ca3af;">Draft saved</div>
             <div style="display:flex; gap:12px;">
                <button type="button" class="btn-cancel" id="cancelEdit">Cancel</button>
                <button type="button" class="btn-primary" id="savePublish">Save Post</button>
             </div>
          </div>
        </div>

      </main>

    </div>
  </div>

  <!-- TipTap Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/core@2/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/starter-kit@2/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-link@2/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-image@2/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-placeholder@2/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tiptap/extension-underline@2/dist/index.umd.js"></script>

  <script src="/admin/js/supabase-config.js"></script>
  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/blogs.js"></script>
  <script src="js/admin-chat.js"></script>
</body>
</html>
