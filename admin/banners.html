  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banners | Pulse Admin</title>
  <link rel="icon" href="/image/pulse-logo.png">
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Core Styles -->
  <link rel="stylesheet" href="/admin/css/admin-shell.css">
  <!-- Page Styles -->
  <link rel="stylesheet" href="/admin/css/banners.css">
  <link rel="stylesheet" href="css/pulse-admin-theme.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M5DZWPXR"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <div class="admin-shell">
    
    <!-- TOP NAV -->
    <nav class="top-nav">
      <img src="/image/pulse-logo.png" height="28" alt="Pulse">
      <span class="nav-divider"></span>
      <div class="nav-tabs">
        <a href="/admin/dashboard.html" class="nav-tab">Overview</a>
        <a href="/admin/form-submissions.html" class="nav-tab">Submissions</a>
        <a href="/admin/blogs.html" class="nav-tab active">Content</a>
      </div>
      <div class="nav-spacer"></div>
      <button class="nav-icon-btn" id="bell-btn">
        <i class="ti ti-bell"></i>
        <span class="bell-badge" id="bell-badge" style="display:none"></span>
      </button>
      <div class="user-pill" id="user-pill" onclick="window.shellLogout()">
        <div class="user-avatar" id="user-avatar">--</div>
        <span id="user-name">Loading</span>
        <i class="ti ti-chevron-down"></i>
      </div>
    </nav>

    <!-- BODY ROW -->
    <div class="shell-body">
      
      <!-- ICON RAIL -->
      <aside class="icon-rail">
        <a href="/admin/dashboard.html" class="rail-icon" 
           data-page="dashboard" title="Dashboard">
          <i class="ti ti-layout-dashboard"></i>
        </a>
        <a href="/admin/form-submissions.html" class="rail-icon" 
           data-page="submissions" title="Form Submissions">
          <i class="ti ti-mail"></i>
        </a>
        <a href="/admin/blogs.html" class="rail-icon" 
           data-page="blogs" title="Blogs">
          <i class="ti ti-article"></i>
        </a>
        <a href="/admin/banners.html" class="rail-icon active" 
           data-page="banners" title="Banners">
          <i class="ti ti-photo"></i>
        </a>
        <a href="/admin/products.html" class="rail-icon" 
           data-page="products" title="Products">
          <i class="ti ti-box"></i>
        </a>
        <div class="rail-sep"></div>
        <a href="/admin/admin-users.html" class="rail-icon" 
           data-page="users" title="Admin Users">
          <i class="ti ti-users"></i>
        </a>
        <div class="rail-bottom">
          <button class="rail-icon" id="logout-btn" title="Logout" onclick="window.shellLogout()">
            <i class="ti ti-logout"></i>
          </button>
        </div>
      </aside>

      <!-- PAGE CONTENT -->
      <main class="page-content" id="page-content">
        <div class="banners-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
          <div>
            <h1>Banners</h1>
            <p class="section-sub">Manage homepage banners and promotional content</p>
          </div>
          <button class="btn-primary" id="addBannerBtn" style="width:auto; padding:10px 20px;">+ New banner</button>
        </div>

        <div class="banners-layout" style="display:grid; grid-template-columns:1fr 400px; gap:24px;">
          <!-- Banner List Area -->
          <div class="list-area">
            <div id="bannerList" class="banner-list" style="display:none;"></div>
            <div id="emptyState" class="empty-state" style="display:none; text-align:center; padding:60px 20px; background:#fff; border-radius:12px; border:1px dashed rgba(0,0,0,0.1);">
              <i class="ti ti-photo" style="font-size:48px; color:#9ca3af; margin-bottom:16px;"></i>
              <h2 style="font-size:18px; font-weight:600;">No banners yet</h2>
              <p style="color:#6b7280; font-size:14px;">Create your first homepage banner to get started.</p>
              <button class="btn-primary" onclick="document.getElementById('addBannerBtn').click()" style="margin-top:20px;">+ New banner</button>
            </div>
          </div>

          <!-- Preview Pane -->
          <div class="preview-pane-wrap">
            <div class="preview-pane" style="position:sticky; top:24px; background:#fff; border:0.5px solid rgba(0,0,0,0.08); border-radius:12px; padding:20px;">
              <div class="preview-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="font-size:15px; font-weight:600;">Live Preview</h3>
                <div class="preview-toggle" style="display:flex; background:#f4f5f7; padding:2px; border-radius:6px;">
                  <button class="active" data-mode="desktop" style="background:#fff; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;"><i class="ti ti-device-desktop"></i></button>
                  <button data-mode="mobile" style="background:none; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; color:#6b7280;"><i class="ti ti-device-mobile"></i></button>
                </div>
              </div>
              <div class="banner-preview-box" id="previewBox" style="position:relative; aspect-ratio:16/9; background:#f4f5f7; border-radius:8px; overflow:hidden;">
                <img id="previewImg" src="" style="width:100%; height:100%; object-fit:cover;">
                <div class="banner-preview-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.3); display:flex; flex-direction:column; justify-content:center; padding:24px; color:#fff;">
                  <div class="preview-title" id="previewTitle" style="font-size:18px; font-weight:700;">Banner Title</div>
                  <div class="preview-subtitle" id="previewSubtitle" style="font-size:11px; opacity:0.9; margin-top:4px;">Subtitle appears here.</div>
                  <div class="preview-cta" id="previewCta" style="margin-top:16px; background:#fff; color:#1d3461; display:inline-block; padding:4px 12px; border-radius:4px; font-size:11px; font-weight:600; align-self:start;">Learn more</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- Editor Drawer -->
  <div id="drawerOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; opacity:0; pointer-events:none; transition:opacity 200ms;"></div>
  <div id="bannerDrawer" style="position:fixed; top:0; right:-480px; bottom:0; width:480px; background:#fff; z-index:1001; transition:right 200ms cubic-bezier(0.4, 0, 0.2, 1); box-shadow:-8px 0 32px rgba(0,0,0,0.1);">
    <div style="padding:24px; display:flex; flex-direction:column; height:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <h2 id="drawerTitle" style="font-size:18px; font-weight:600;">New Banner</h2>
        <button id="drawerClose" style="background:none; border:none; font-size:24px; cursor:pointer; color:#6b7280;">&times;</button>
      </div>
      <div class="drawer-body" style="flex:1; overflow-y:auto;">
        <form id="bannerForm">
          <!-- Fields (simplified for brevity, keeping all IDs for JS) -->
          <div class="field" style="margin-bottom:20px;">
            <label style="font-size:12px; font-weight:600; display:block; margin-bottom:8px;">Banner Image</label>
            <div id="uploadZone" class="upload-zone" style="border:1px dashed rgba(0,0,0,0.1); border-radius:12px; padding:32px; text-align:center; cursor:pointer; position:relative;">
              <i class="ti ti-cloud-upload" style="font-size:32px; color:#6b7280;"></i>
              <p style="font-size:13px; margin:8px 0;">Click to upload</p>
              <img id="uploadPreview" style="display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:12px;">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
          </div>
          <div class="field" style="margin-bottom:20px;">
            <label style="font-size:12px; font-weight:600; display:block; margin-bottom:8px;">Title</label>
            <input type="text" id="f_title" name="title" required maxlength="80" style="width:100%; padding:10px; border:1px solid rgba(0,0,0,0.1); border-radius:8px;">
          </div>
          <div class="field" style="margin-bottom:20px;">
            <label style="font-size:12px; font-weight:600; display:block; margin-bottom:8px;">Subtitle</label>
            <textarea id="f_subtitle" name="subtitle" rows="3" maxlength="160" style="width:100%; padding:10px; border:1px solid rgba(0,0,0,0.1); border-radius:8px;"></textarea>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
            <div class="field">
              <label style="font-size:12px; font-weight:600; display:block; margin-bottom:8px;">Button Text</label>
              <input type="text" id="f_cta_text" name="cta_text" style="width:100%; padding:10px; border:1px solid rgba(0,0,0,0.1); border-radius:8px;">
            </div>
            <div class="field">
              <label style="font-size:12px; font-weight:600; display:block; margin-bottom:8px;">Link</label>
              <input type="text" id="f_cta_link" name="cta_link" style="width:100%; padding:10px; border:1px solid rgba(0,0,0,0.1); border-radius:8px;">
            </div>
          </div>
        </form>
      </div>
      <div style="padding-top:24px; border-top:1px solid rgba(0,0,0,0.05); display:flex; gap:12px;">
        <button type="button" class="btn-cancel" style="flex:1;" onclick="document.getElementById('drawerClose').click()">Cancel</button>
        <button type="submit" form="bannerForm" class="btn-primary" style="flex:1;">Save Banner</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/admin/js/supabase-config.js"></script>
  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/banners.js"></script>
  <script src="js/admin-chat.js"></script>
</body>
</html>
