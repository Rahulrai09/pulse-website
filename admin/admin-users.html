  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Users | Pulse Admin</title>
  <link rel="icon" href="/image/pulse-logo.png">
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Core Styles -->
  <link rel="stylesheet" href="/admin/css/admin-shell.css">
  <link rel="stylesheet" href="/admin/css/admin-users.css">
  <link rel="stylesheet" href="css/pulse-admin-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M5DZWPXR"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <div class="admin-shell">
    
    <!-- TOP NAV -->
    <nav class="top-nav">
      <img src="/image/pulse-logo.png" height="28" alt="Pulse">
      <span class="nav-divider"></span>
      <div class="nav-tabs">
        <a href="/admin/dashboard.html" class="nav-tab">Overview</a>
        <a href="/admin/form-submissions.html" class="nav-tab">Submissions</a>
        <a href="/admin/blogs.html" class="nav-tab">Content</a>
      </div>
      <div class="nav-spacer"></div>
      <button class="nav-icon-btn" id="bell-btn">
        <i class="ti ti-bell"></i>
        <span class="bell-badge" id="bell-badge" style="display:none"></span>
      </button>
      <div class="user-pill" id="user-pill" onclick="window.shellLogout()">
        <div class="user-avatar" id="user-avatar">--</div>
        <span id="user-name">Loading</span>
        <i class="ti ti-chevron-down"></i>
      </div>
    </nav>

    <!-- BODY ROW -->
    <div class="shell-body">
      
      <!-- ICON RAIL -->
      <aside class="icon-rail">
        <a href="/admin/dashboard.html" class="rail-icon" 
           data-page="dashboard" title="Dashboard">
          <i class="ti ti-layout-dashboard"></i>
        </a>
        <a href="/admin/form-submissions.html" class="rail-icon" 
           data-page="submissions" title="Form Submissions">
          <i class="ti ti-mail"></i>
        </a>
        <a href="/admin/blogs.html" class="rail-icon" 
           data-page="blogs" title="Blogs">
          <i class="ti ti-article"></i>
        </a>
        <a href="/admin/banners.html" class="rail-icon" 
           data-page="banners" title="Banners">
          <i class="ti ti-photo"></i>
        </a>
        <a href="/admin/products.html" class="rail-icon" 
           data-page="products" title="Products">
          <i class="ti ti-box"></i>
        </a>
        <div class="rail-sep"></div>
        <a href="/admin/admin-users.html" class="rail-icon active" 
           data-page="users" title="Admin Users">
          <i class="ti ti-users"></i>
        </a>
        <div class="rail-bottom">
          <button class="rail-icon" id="logout-btn" title="Logout" onclick="window.shellLogout()">
            <i class="ti ti-logout"></i>
          </button>
        </div>
      </aside>

      <!-- PAGE CONTENT -->
      <main class="page-content" id="page-content">
        <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
          <div>
            <h1>Admin Users</h1>
            <p class="section-sub">Manage team access and view audit logs.</p>
          </div>
          <button class="btn-primary" id="btnInviteOpen">
            <i class="ti ti-user-plus"></i> Invite admin
          </button>
        </div>

        <!-- Tab Strip -->
        <div class="tabs-strip" style="display:flex; gap:8px; border-bottom:1px solid rgba(0,0,0,0.05); margin-bottom:24px; padding-bottom:8px;">
          <button class="tab-btn active" data-tab="users" style="background:none; border:none; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; border-radius:8px;">All Users</button>
          <button class="tab-btn" data-tab="audit" style="background:none; border:none; padding:8px 16px; font-size:13px; font-weight:500; cursor:pointer; border-radius:8px; color:#6b7280;">Audit Log</button>
        </div>

        <!-- Tab 1: Users -->
        <div class="tab-content active" id="tabUsers">
          <div class="card" style="padding:0; overflow:hidden;">
            <table style="width:100%; border-collapse:collapse; font-size:13px; text-align:left;">
              <thead style="background:#f9fafb; border-bottom:1px solid rgba(0,0,0,0.05);">
                <tr>
                  <th style="padding:12px 16px;">User</th>
                  <th style="padding:12px 16px;">Role</th>
                  <th style="padding:12px 16px;">Status</th>
                  <th style="padding:12px 16px;">Last Login</th>
                  <th style="padding:12px 16px;">Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="5" style="padding:40px; text-align:center;">Loading users...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Tab 2: Audit Log -->
        <div class="tab-content" id="tabAudit" style="display:none;">
           <!-- Existing audit log structure preserved -->
           <div id="auditTableBody"></div>
        </div>
      </main>

    </div>
  </div>

  <script src="/admin/js/supabase-config.js"></script>
  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/admin-users.js"></script>
  <script src="js/admin-chat.js"></script>
</body>
</html>
