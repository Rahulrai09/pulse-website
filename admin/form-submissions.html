  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Core Styles -->
  <link rel="stylesheet" href="/admin/css/admin-shell.css">
  <link rel="stylesheet" href="css/pulse-admin-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M5DZWPXR"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="admin-shell">
    
    <!-- TOP NAV -->
    <nav class="top-nav">
      <img src="/image/pulse-logo.png" height="28" alt="Pulse">
      <span class="nav-divider"></span>
      <div class="nav-tabs">
        <a href="/admin/dashboard.html" class="nav-tab">Overview</a>
        <a href="/admin/form-submissions.html" class="nav-tab active">Submissions</a>
        <a href="/admin/blogs.html" class="nav-tab">Content</a>
      </div>
      <div class="nav-spacer"></div>
      <button class="nav-icon-btn" id="bell-btn">
        <i class="ti ti-bell"></i>
        <span class="bell-badge" id="bell-badge" style="display:none"></span>
      </button>
      <div class="user-pill" id="user-pill" onclick="window.shellLogout()">
        <div class="user-avatar" id="user-avatar">--</div>
        <span id="user-name">Loading</span>
        <i class="ti ti-chevron-down"></i>
      </div>
    </nav>

    <!-- BODY ROW -->
    <div class="shell-body">
      
      <!-- ICON RAIL -->
      <aside class="icon-rail">
        <a href="/admin/dashboard.html" class="rail-icon" 
           data-page="dashboard" title="Dashboard">
          <i class="ti ti-layout-dashboard"></i>
        </a>
        <a href="/admin/form-submissions.html" class="rail-icon active" 
           data-page="submissions" title="Form Submissions">
          <i class="ti ti-mail"></i>
        </a>
        <a href="/admin/blogs.html" class="rail-icon" 
           data-page="blogs" title="Blogs">
          <i class="ti ti-article"></i>
        </a>
        <a href="/admin/banners.html" class="rail-icon" 
           data-page="banners" title="Banners">
          <i class="ti ti-photo"></i>
        </a>
        <a href="/admin/products.html" class="rail-icon" 
           data-page="products" title="Products">
          <i class="ti ti-box"></i>
        </a>
        <div class="rail-sep"></div>
        <a href="/admin/admin-users.html" class="rail-icon" 
           data-page="users" title="Admin Users">
          <i class="ti ti-users"></i>
        </a>
        <div class="rail-bottom">
          <button class="rail-icon" id="logout-btn" title="Logout" onclick="window.shellLogout()">
            <i class="ti ti-logout"></i>
          </button>
        </div>
      </aside>

      <!-- PAGE CONTENT -->
      <main class="page-content" id="page-content">
        <h1>Form Submissions</h1>
        <p class="section-sub">Review and manage submissions from your website forms.</p>

        <!-- Filter Bar -->
        <div class="filter-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:16px; flex-wrap:wrap;">
          <div class="status-pills" id="statusPills" style="display:flex; gap:8px; align-items:center; margin-bottom:16px;">
            <button class="filter-tab active" data-status="">All</button>
            <button class="filter-tab" data-status="new">New</button>
            <button class="filter-tab" data-status="read">Read</button>
            <button class="filter-tab" data-status="replied">Replied</button>
            <button class="filter-tab" data-status="archived">Archived</button>
          </div>
          <div class="filter-controls" style="display:flex; gap:8px; align-items:center;">
            <select id="filterType" style="padding:6px 12px; border-radius:8px; border:1px solid rgba(0,0,0,0.1);">
              <option value="">All Types</option>
              <option value="contact">Contact</option>
              <option value="quote">Quote</option>
              <option value="newsletter">Newsletter</option>
              <option value="demo">Demo</option>
            </select>
            <input type="text" id="filterSearch" placeholder="Search name or email..." style="padding:6px 12px; border-radius:8px; border:1px solid rgba(0,0,0,0.1); min-width:200px;">
          </div>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
          <table style="width:100%; border-collapse:collapse; font-size:13px; text-align:left;">
            <thead>
              <tr style="background:#f9fafb; border-bottom:1px solid rgba(0,0,0,0.05);">
                <th style="padding:12px 16px;">Date</th>
                <th style="padding:12px 16px;">Type</th>
                <th style="padding:12px 16px;">Name</th>
                <th style="padding:12px 16px;">Email</th>
                <th style="padding:12px 16px;">Status</th>
                <th style="padding:12px 16px;">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="6" style="padding:40px; text-align:center; color:#6b7280;">Loading submissions...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination" id="pagination" style="display:none; margin-top:20px; justify-content:space-between; align-items:center;">
          <div id="paginationInfo" style="font-size:12px; color:#6b7280;"></div>
          <div id="paginationBtns" style="display:flex; gap:4px;"></div>
        </div>
      </main>

    </div>
  </div>

  <!-- Detail Drawer -->
  <div id="drawerOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; opacity:0; pointer-events:none; transition:opacity 200ms;"></div>
  <div id="drawer" style="position:fixed; top:0; right:-450px; bottom:0; width:450px; background:#fff; z-index:1001; transition:right 200ms cubic-bezier(0.4, 0, 0.2, 1); box-shadow:-8px 0 32px rgba(0,0,0,0.1);">
    <div style="padding:24px; display:flex; flex-direction:column; height:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <h2 style="font-size:18px; font-weight:600;">Submission Details</h2>
        <button id="drawerClose" style="background:none; border:none; font-size:24px; cursor:pointer; color:#6b7280;">&times;</button>
      </div>
      <div id="drawerBody" style="flex:1; overflow-y:auto;"></div>
      <div id="drawerFooter" style="padding-top:24px; border-top:1px solid rgba(0,0,0,0.05); display:flex; gap:12px;"></div>
    </div>
  </div>

  <script src="/admin/js/supabase-config.js"></script>
  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/form-submissions.js"></script>
  <script src="js/admin-chat.js"></script>
</body>
</html>
