<div id="global-header"></div>
<script src="js/header.js"></script>

<div id="postLoading"><p>Loading insight...</p></div>

<article id="postContent">
  <header class="post-header">
    <div class="post-breadcrumbs"><a href="index.html">Home</a> &gt; <a href="blog.html">Insights</a> &gt; <span id="breadcrumbCategory">Category</span></div>
    <a href="#" class="post-category-badge" id="postCategoryBadge">Category</a>
    <h1 class="post-title" id="postTitle"></h1>
    <p class="post-excerpt" id="postExcerpt"></p>
    <div class="post-meta"><span id="postDate"></span> &bull; <span id="postReadTime"></span> &bull; <span id="postViews"></span></div>
  </header>
  <img src="" id="postFeaturedImage" class="post-featured-image">
  <div class="post-body" id="postBody"></div>
  <div class="post-tags" id="postTags"></div>
  <section class="related-posts">
    <div class="related-posts-container">
      <h2>Continue Reading</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </section>
</article>

<div class="post-not-found" id="postNotFound" style="display:none;">
  <h1>Insight not found</h1>
  <p>The story you're looking for doesn't exist.</p>
  <a href="blog.html" class="btn-back-to-blog">Back to Insights</a>
</div>

<div id="global-footer"></div>
<script src="js/footer.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/pulse-forms.js"></script>
<script src="js/public-content.js"></script>
<script>
  // Navbar Logic
  document.getElementById('nav-contact-btn').addEventListener('click', (e) => {
    e.preventDefault(); document.getElementById('nav-contact-dropdown').classList.toggle('open'); e.stopPropagation();
  });
  document.addEventListener('click', () => document.getElementById('nav-contact-dropdown').classList.remove('open'));

  // Post Logic
  async function init() {
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) { showNotFound(); return; }
    const post = await PulseContent.fetchBlogBySlug(slug);
    if (!post) { showNotFound(); return; }
    renderPost(post);
    loadRelated(post.id, post.category_id);
    PulseContent.incrementBlogView(post.id, post.view_count);
  }

  function showNotFound() {
    document.getElementById('postLoading').style.display = 'none';
    document.getElementById('postNotFound').style.display = 'block';
  }

  function renderPost(post) {
    document.getElementById('postLoading').style.display = 'none';
    document.getElementById('postContent').style.display = 'block';
    document.title = `${post.title} | Pulse Insights`;
    document.getElementById('breadcrumbCategory').textContent = post.category_name;
    document.getElementById('postCategoryBadge').textContent = post.category_name;
    document.getElementById('postCategoryBadge').href = `blog.html?category=${post.category_slug}`;
    document.getElementById('postTitle').textContent = post.title;
    document.getElementById('postExcerpt').textContent = post.excerpt || '';
    document.getElementById('postDate').textContent = new Date(post.published_at).toLocaleDateString();
    document.getElementById('postReadTime').textContent = `${post.reading_time_minutes || 5} min read`;
    document.getElementById('postViews').textContent = `${post.view_count || 0} views`;
    if (post.featured_image_url) document.getElementById('postFeaturedImage').src = post.featured_image_url;
    else document.getElementById('postFeaturedImage').style.display = 'none';
    document.getElementById('postBody').innerHTML = post.content_html;
  }

  async function loadRelated(postId, categoryId) {
    const related = await PulseContent.fetchRelatedBlogs(postId, categoryId);
    related.forEach(post => {
      const card = `<a href="blog-post.html?slug=${post.slug}" class="blog-card">
        <div class="blog-card-img"><img src="${post.featured_image_url || 'image/pulse-logo.png'}" loading="lazy"></div>
        <div class="blog-card-body"><span class="blog-card-category">${post.category_name}</span><h3 class="blog-card-title">${post.title}</h3></div>
      </a>`;
      document.getElementById('relatedGrid').insertAdjacentHTML('beforeend', card);
    });
  }

  init();
</script>
<div id="global-footer"></div>
<script src="js/footer.js"></script>
</body>
</html>
